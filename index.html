<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Audit — Gauge × KÉNOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root{
  --cream:#faf9f6;--white:#fff;--ink:#1a1814;--ink2:#3d3b36;--ink3:#7a7872;--ink4:#bbb8b0;
  --line:#e8e5de;--line2:#f0ede6;
  --green:#1a7a52;--gl:#e8f4ee;--gm:#2ecc8a;
  --amber:#a05000;--al:#fef3e4;--am:#f5a623;
  --red:#b02a20;--rl:#fdecea;--rm:#e74c3c;
  --blue:#1a4fa0;--bl:#eaf0fb;--bm:#4d9fff;
  --purple:#5b3fa0;--pm:#8b6fd4;--pl:#ede9ff;
  --sans:'Geist',sans-serif;--mono:'Geist Mono',monospace;
  --r:8px;--rs:4px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh-sm:0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:224px;min-height:100vh;background:var(--white);border-right:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;overflow-x:hidden}
.sb-brand{padding:22px 18px 18px;border-bottom:1px solid var(--line)}
.sb-mark{width:30px;height:30px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sb-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.sb-sub{font-size:11px;color:var(--ink3);margin-top:1px;font-family:var(--mono)}
.sb-section{padding:14px 10px 6px}
.sb-lbl{font-size:10px;font-weight:500;color:var(--ink4);text-transform:uppercase;letter-spacing:.09em;padding:0 8px 7px;font-family:var(--mono)}
.nb{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r);cursor:pointer;font-size:12px;color:var(--ink2);border:none;background:none;width:100%;text-align:left;transition:all .12s;font-family:var(--sans)}
.nb:hover{background:var(--line2);color:var(--ink)}
.nb.active{background:var(--ink);color:var(--white)}
.nb.active .ns{color:rgba(255,255,255,.5)}
.nd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.nl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ns{font-family:var(--mono);font-size:11px;font-weight:500;margin-left:auto;flex-shrink:0}
.sb-foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--line)}
.sb-foot p{font-size:11px;color:var(--ink4);line-height:1.5;padding:8px 9px;background:var(--cream);border-radius:var(--r)}
/* lang switch */
.lsw{display:flex;align-items:center;gap:2px;background:var(--line2);border-radius:20px;padding:3px;margin-top:10px;width:fit-content}
.lb{padding:4px 11px;border-radius:16px;border:none;background:none;cursor:pointer;font-size:11px;font-weight:500;font-family:var(--mono);color:var(--ink3);transition:all .15s;line-height:1}
.lb.on{background:var(--white);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08)}
/* mobile */
.mhdr{display:none;align-items:center;justify-content:space-between;padding:14px 18px;background:var(--white);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:200}
.mh-l{display:flex;align-items:center;gap:10px}
.mh-mk{width:26px;height:26px;background:var(--ink);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.mh-nm{font-size:13px;font-weight:600;color:var(--ink)}
.mh-sb{font-size:10px;color:var(--ink3);font-family:var(--mono)}
.hbg{width:36px;height:36px;border:1px solid var(--line);border-radius:var(--r);background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;flex-shrink:0}
.hbg span{display:block;width:16px;height:1.5px;background:var(--ink);border-radius:1px}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;backdrop-filter:blur(2px)}
.ov.open{display:block}
.drw{position:fixed;top:0;left:0;bottom:0;width:290px;background:var(--white);z-index:400;transform:translateX(-100%);transition:transform .25s cubic-bezier(.4,0,.2,1);overflow-y:auto;box-shadow:4px 0 32px rgba(0,0,0,.14)}
.drw.open{transform:translateX(0)}
.drw-x{position:absolute;top:14px;right:14px;width:30px;height:30px;border:1px solid var(--line);border-radius:var(--r);background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--ink3);font-size:18px;line-height:1}
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--white);border-top:1px solid var(--line);z-index:200;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.bni{display:flex;justify-content:space-around}
.bn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 8px;border-radius:var(--r);border:none;background:none;cursor:pointer;font-family:var(--sans);min-width:52px}
.bn-d{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.bn-l{font-size:9px;font-weight:500;color:var(--ink3);font-family:var(--mono);text-align:center;line-height:1.3;max-width:56px}
.bn.on .bn-l{color:var(--ink)}
.bn.on .bn-d{background:var(--ink)!important}
/* topbar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;background:var(--white);border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}
.tb-eye{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:4px}
.tb-title{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1.2}
.tb-sub{font-size:11px;color:var(--ink3);margin-top:3px;font-family:var(--mono)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--mono)}
.badge.good{background:var(--gl);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.badge.warn{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.badge.bad{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
/* content */
.content{padding:28px 32px}
.krow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm)}
.kl{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;font-family:var(--mono);margin-bottom:8px}
.kv{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em;color:var(--ink)}
.kv.good{color:var(--green)}.kv.warn{color:var(--amber)}.kv.bad{color:var(--red)}
.ks{font-size:11px;color:var(--ink3);margin-top:6px;font-family:var(--mono)}
.g2{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.g2e{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh-sm)}
.ct{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;font-family:var(--mono);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line2)}
.sr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sn{font-size:12px;color:var(--ink2);width:150px;flex-shrink:0}
.st{flex:1;height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px}
.sv{font-family:var(--mono);font-size:12px;font-weight:500;width:28px;text-align:right}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);padding:0 8px 10px;border-bottom:1px solid var(--line)}
.tbl td{padding:10px 8px;border-bottom:1px solid var(--line2);font-size:12px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--cream)}
.tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.tm{background:#ede9ff;color:#5b3fa0}.td{background:var(--gl);color:var(--green)}.tt{background:var(--al);color:var(--amber)}
.bcl{display:flex;align-items:center;gap:8px}
.bct{flex:1;height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
.bcf{height:100%;border-radius:2px}
.bcp{font-family:var(--mono);font-size:11px;width:32px}
.dwrp{position:relative;height:158px}
.dct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dbig{font-size:26px;font-weight:700;letter-spacing:-.02em}
.dlbl{font-size:10px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.leg{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:11px;color:var(--ink2)}
.li{display:flex;align-items:center;gap:5px}
.lsq{width:8px;height:8px;border-radius:2px;display:inline-block}
.fnd{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line2);align-items:flex-start}
.fnd:last-child{border-bottom:none}
.fbg{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.fb{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.fw{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.fg{background:var(--gl);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.ft{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:2px}
.fd{font-size:11px;color:var(--ink3);line-height:1.5}
.prio{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r);background:var(--cream);margin-bottom:5px;border:1px solid var(--line2)}
.pn{font-family:var(--mono);font-size:10px;color:var(--ink4);width:14px;flex-shrink:0;padding-top:1px}
.pt{font-size:11px;flex:1;line-height:1.5;color:var(--ink2)}
.ptag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;font-family:var(--mono);flex-shrink:0}
.ptag.crit{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.ptag.high{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.ptag.med{background:var(--bl);color:var(--blue);border:1px solid rgba(77,159,255,.2)}
.spr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.spn{font-size:11px;color:var(--ink2);width:115px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.spk{flex:1;height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
.spf{height:100%;border-radius:2px;background:var(--pm)}
.spv{font-family:var(--mono);font-size:11px;color:var(--purple);width:26px;text-align:right}
.ofc{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .14s;box-shadow:var(--sh-sm)}
.ofc:hover{border-color:var(--ink4);box-shadow:var(--sh);transform:translateY(-1px)}
.ofc-i{flex:1;min-width:0}
.ofc-n{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.ofc-m{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.ofc-kk{display:flex;gap:20px;flex-shrink:0}
.ofc-k{text-align:center}
.ofc-kv{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1}
.ofc-kl{font-size:9px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.ofc-a{color:var(--ink4);flex-shrink:0}
.notes{background:var(--cream);border-left:2px solid var(--line);padding:10px 12px;font-size:11px;color:var(--ink2);line-height:1.6;margin-top:12px;border-radius:0 var(--rs) var(--rs) 0}
.sec{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin:24px 0 12px}
.mhero{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:28px 32px;box-shadow:var(--sh-sm);display:flex;align-items:center;gap:32px;margin-bottom:12px}
.msc{flex-shrink:0;text-align:center}
.mnum{font-size:72px;font-weight:700;letter-spacing:-.04em;line-height:1}
.mlbl{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-top:4px}
.mdiv{width:1px;height:80px;background:var(--line);flex-shrink:0}
.mbod{flex:1;min-width:0}
.mhl{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em;margin-bottom:8px;line-height:1.35}
.mdsc{font-size:13px;color:var(--ink2);line-height:1.65}
.mphs{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.php{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--line)}
.ph1{background:var(--rl);color:var(--red);border-color:rgba(231,76,60,.2)}
.ph2{background:var(--al);color:var(--amber);border-color:rgba(245,166,35,.2)}
.ph3{background:var(--gl);color:var(--green);border-color:rgba(46,204,138,.2)}
.phn{font-family:var(--mono);font-weight:700}
.rg{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.rc{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh-sm);cursor:pointer;transition:all .13s}
.rc:hover{transform:translateY(-1px);box-shadow:var(--sh)}
.rf{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);margin-bottom:10px}
.rbl{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.rri{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.rok{background:var(--gl);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.rwp{background:var(--pl);color:var(--purple);border:1px solid rgba(139,111,212,.2)}
.rn{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:4px}
.rr{font-size:11px;color:var(--ink3);line-height:1.45}
.rs{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-.02em;margin-top:8px}
.rm{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
.rmc{border-radius:var(--r);padding:16px 18px;border:1px solid}
.rm1{background:#fff5f5;border-color:rgba(231,76,60,.15)}
.rm2{background:#fffbf0;border-color:rgba(245,166,35,.15)}
.rm3{background:#f0faf5;border-color:rgba(46,204,138,.15)}
.rmph{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px}
.rm1 .rmph{color:var(--red)}.rm2 .rmph{color:var(--amber)}.rm3 .rmph{color:var(--green)}
.rmti{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}
.rmdu{font-size:11px;font-family:var(--mono);margin-bottom:10px}
.rm1 .rmdu{color:var(--red)}.rm2 .rmdu{color:var(--amber)}.rm3 .rmdu{color:var(--green)}
.rmi{display:flex;gap:7px;font-size:11px;color:var(--ink2);margin-bottom:5px;line-height:1.45}
.rmb{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.rm1 .rmb{background:var(--red)}.rm2 .rmb{background:var(--amber)}.rm3 .rmb{background:var(--green)}
.rmim{margin-top:10px;padding:8px 10px;border-radius:var(--rs);font-size:11px;font-family:var(--mono);font-weight:500}
.rm1 .rmim{background:rgba(231,76,60,.08);color:var(--red)}
.rm2 .rmim{background:rgba(245,166,35,.08);color:var(--amber)}
.rm3 .rmim{background:rgba(46,204,138,.08);color:var(--green)}
.mtag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);background:var(--cream);border:1px solid var(--line);color:var(--ink3);margin-bottom:16px}
.dc{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh-sm)}
.dn{font-size:32px;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:2px}
.dla{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.de{margin-top:10px;padding:8px 10px;background:var(--al);border-radius:var(--rs);font-size:11px;color:var(--amber);font-family:var(--mono);font-weight:500}
.ins{background:var(--bl);border:1px solid rgba(77,159,255,.2);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--blue);line-height:1.55;margin-bottom:12px}
.cw{position:relative;height:200px}
.cwt{position:relative;height:230px}
.cws{position:relative;height:260px}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
canvas{display:block}
/* responsive */
@media(max-width:1024px){
  .sidebar{width:200px}
  .krow{grid-template-columns:repeat(2,minmax(0,1fr))}
  .g4{grid-template-columns:repeat(2,minmax(0,1fr))}
  .rg{grid-template-columns:repeat(2,minmax(0,1fr))}
  .rm{grid-template-columns:1fr}
  .mhero{flex-direction:column;gap:20px;padding:22px}
  .mdiv{display:none}
  .mnum{font-size:56px}
}
@media(max-width:768px){
  .shell{flex-direction:column}
  .sidebar{display:none}
  .mhdr{display:flex}
  .bnav{display:block}
  .main{padding-bottom:72px}
  .content{padding:16px}
  .topbar{padding:14px 16px;gap:8px}
  .tb-title{font-size:16px}
  .badge{font-size:11px;padding:5px 10px}
  .krow{grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
  .kpi{padding:12px 14px}.kv{font-size:22px}
  .g2,.g2e,.g3,.g4{grid-template-columns:1fr}
  .rg{grid-template-columns:1fr 1fr}
  .rm{grid-template-columns:1fr}
  .mhero{flex-direction:column;padding:16px;gap:16px}
  .mdiv{display:none}.mnum{font-size:52px}
  .mhl{font-size:14px}.mdsc{font-size:12px}
  .mphs{gap:6px}.php{font-size:10px;padding:4px 10px}
  .dc{padding:12px 14px}.dn{font-size:24px}
  .card{padding:14px 16px}
  .ofc{flex-wrap:wrap;gap:10px;padding:12px 14px}
  .ofc-kk{gap:12px}.ofc-kv{font-size:15px}
  .sn{width:110px;font-size:11px}
  .cw{height:160px}.cwt{height:180px}.cws{height:200px}
  .dwrp{height:140px}
  .tbl{font-size:11px}.tbl th,.tbl td{padding:7px 5px}
  .ofc-a{display:none}
}
@media(max-width:480px){
  .krow{grid-template-columns:1fr 1fr}
  .rg{grid-template-columns:1fr}
  .ofc-kk{display:none}
  .mphs{flex-direction:column}
}
</style>
</head>
<body>
<div class="shell">

// ═══ HELPERS ═════════════════════════════════════════════════════
let charts = {}, view = 'exec';
const sc = v => v>=70?'#1a7a52':v>=40?'#a05000':'#b02a20';
const hc = v => v>=70?'good':v>=45?'warn':'bad';
const hl = v => v>=70?t('hGood'):v>=45?t('hWarn'):t('hBad');
const fmt = n => (n||0).toLocaleString('pt-BR');
const avg = arr => Math.round(arr.reduce((a,v)=>a+v,0)/arr.length);
const L = k => t(k); // alias

function killCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch{}}); charts={}; }

function setLang(l) {
  lang = l;
  ['sb','mh','dr'].forEach(p => {
    const pt = document.getElementById(p+'-pt'), es = document.getElementById(p+'-es');
    if(pt){ pt.classList.toggle('on', l==='pt'); es.classList.toggle('on', l==='es'); }
  });
  updateStaticLabels();
  killCharts();
  render(view);
  renderNav();
}

function updateStaticLabels() {
  const set = (id, val) => { const el = document.getElementById(id); if(el) el.textContent = val; };
  set('lbl-exec-sec', t('execSec')); set('lbl-exec', t('execLbl')); set('lbl-tech', t('techLbl'));
  set('lbl-files-sec', t('filesSec')); set('lbl-footer', t('footer'));
  set('dr-exec-sec', t('execSec')); set('dr-exec', t('execLbl')); set('dr-tech', t('techLbl'));
  set('dr-files-sec', t('filesSec')); set('dr-footer', t('footer'));
  set('bn-exec', t('bnExec')); set('bn-tech', t('bnTech')); set('bn-files', t('bnFiles'));
}

function openDrawer(){ document.getElementById('drw').classList.add('open'); document.getElementById('ov').classList.add('open'); }
function closeDrawer(){ document.getElementById('drw').classList.remove('open'); document.getElementById('ov').classList.remove('open'); }
function goD(id){ closeDrawer(); go(id); }

function syncBottomNav() {
  document.querySelectorAll('.bn[data-v]').forEach(el => {
    const on = el.dataset.v === view;
    el.classList.toggle('on', on);
    const d = el.querySelector('.bn-d');
    if(d) d.style.background = on ? 'var(--ink)' : 'var(--line2)';
  });
}

function renderNav() {
  ['exec','tech'].forEach(id => {
    const el = document.getElementById('nav-'+id);
    if(el) el.className = 'nb' + (view===id?' active':'');
  });
  const fnav = document.getElementById('file-nav');
  if(fnav) fnav.innerHTML = FILES.map(f=>`
    <button class="nb ${view===f.id?'active':''}" onclick="go('${f.id}')">
      <span class="nd" style="background:${sc(f.health)}"></span>
      <span class="nl">${f.name}</span>
      <span class="ns">${f.health}</span>
    </button>`).join('');
  const dnav = document.getElementById('dr-file-nav');
  if(dnav) dnav.innerHTML = FILES.map(f=>`
    <button class="nb ${view===f.id?'active':''}" onclick="goD('${f.id}')">
      <span class="nd" style="background:${sc(f.health)}"></span>
      <span class="nl">${f.name}</span>
      <span class="ns">${f.health}</span>
    </button>`).join('');
  syncBottomNav();
}

function go(id){ view=id; killCharts(); renderNav(); render(id); }
function render(id){ const m=document.getElementById('main'); if(id==='exec') renderExec(m); else if(id==='tech') renderTech(m); else renderFile(m, FILES.find(f=>f.id===id)); }

// ═══ RENDER FILE ══════════════════════════════════════════════════
function renderFile(main, f) {
  if(!f){ main.innerHTML=''; return; }
  const pages = f.pages||[];
  const avgComp = pages.length ? avg(pages.map(p=>p.componentized||0)) : 0;
  const avgStyle = pages.length ? avg(pages.map(p=>p.styles||0)) : 0;
  const bestPg = pages.length ? [...pages].sort((a,b)=>(b.styles||0)-(a.styles||0))[0] : null;
  const worstPg = pages.length ? [...pages].sort((a,b)=>(a.componentized||0)-(b.componentized||0))[0] : null;
  const top = f.topComponents||[];
  const maxV = top.length ? Math.max(...top.map(c=>c.vars)) : 1;
  const prios = buildPrios(f);
  const riskClass = {block:'rbl',risk:'rri',ok:'rok',wip:'rwp'};
  const findings = f.findings[lang] || f.findings.pt;
  const notes = f.notes[lang] || f.notes.pt;
  const scores = [[t('sCons'),f.scores?.consist||0],[t('sNam'),f.scores?.naming||0],[t('sMet'),f.scores?.meta||0],[t('sA11'),f.scores?.a11y||0],[t('sTok'),f.scores?.tokens||0],[t('sCov'),f.scores?.coverage||0]];

  main.innerHTML = `
  <div class="topbar">
    <div><div class="tb-eye">${t('fileEye')}</div><div class="tb-title">${f.name}</div><div class="tb-sub">${f.key} · ${f.auditedAt}</div></div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="rf ${riskClass[f.risk]}" style="margin:0">${t('r'+f.risk.charAt(0).toUpperCase()+f.risk.slice(1))}</span>
      <div class="badge ${hc(f.health)}"><span class="bdot"></span>${f.health}/100 — ${hl(f.health)}</div>
    </div>
  </div>
  <div class="content">
    <div class="mtag"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M5 3v2L6.5 6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>${t('method')}</div>
    <div class="krow">
      <div class="kpi"><div class="kl">${t('kCU')}</div><div class="kv">${fmt(f.comps)}</div><div class="ks">${t('kCUSub')}</div></div>
      <div class="kpi"><div class="kl">${t('kVars')}</div><div class="kv">${fmt(f.vars)}${f.vars>0?'+':''}</div><div class="ks">${t('kVarsSub')}</div></div>
      <div class="kpi"><div class="kl">${t('kLoose')}</div><div class="kv bad">${fmt(f.loose)}</div><div class="ks">${t('kLooseSub')}</div></div>
      <div class="kpi"><div class="kl">${t('kHard')}</div><div class="kv bad">${fmt(f.hardcoded)}</div><div class="ks">${t('kHardSub')}</div></div>
    </div>
    <div class="krow">
      <div class="kpi"><div class="kl">${t('kACp')}</div><div class="kv ${hc(avgComp)}">${avgComp}%</div><div class="ks">${t('kACpSub')}</div></div>
      <div class="kpi"><div class="kl">${t('kASt')}</div><div class="kv ${hc(avgStyle)}">${avgStyle}%</div><div class="ks">${t('kAStSub')}</div></div>
      ${bestPg?`<div class="kpi"><div class="kl">${t('kBest')}</div><div class="kv good">${bestPg.styles}%</div><div class="ks">${bestPg.name}</div></div>`:'<div class="kpi"></div>'}
      ${worstPg?`<div class="kpi"><div class="kl">${t('kWorst')}</div><div class="kv bad">${worstPg.componentized}%</div><div class="ks">${worstPg.name}</div></div>`:'<div class="kpi"></div>'}
    </div>
    <div class="g2">
      <div class="card"><div class="ct">${t('ctHlth')}</div>
        ${scores.map(([l,v])=>`<div class="sr"><span class="sn">${l}</span><div class="st"><div class="sf" style="width:${v}%;background:${sc(v)}"></div></div><span class="sv" style="color:${sc(v)}">${v}</span></div>`).join('')}
      </div>
      <div class="card"><div class="ct">${t('ctCGe')}</div>
        <div class="dwrp"><canvas id="f-donut"></canvas>
          <div class="dct"><div class="dbig" style="color:${sc(avgComp)}">${avgComp}%</div><div class="dlbl">componentizados</div></div>
        </div>
        <div class="leg"><span class="li"><span class="lsq" style="background:var(--gm)"></span>${t('lgC')}</span><span class="li"><span class="lsq" style="background:var(--rm)"></span>${t('lgL')}</span></div>
      </div>
    </div>
    ${pages.length?`<div class="card"><div class="ct">${t('ctPPg')}</div>
      <table class="tbl"><thead><tr><th>${t('thPg')}</th><th>${t('thTy')}</th><th style="width:150px">${t('thCp')}</th><th style="width:150px">${t('thSt')}</th><th style="text-align:right">${t('thLo')}</th><th style="text-align:right">${t('thHd')}</th></tr></thead>
      <tbody>${pages.map(p=>{
        const tc=p.type==='mobile'?'tm':p.type==='desktop'?'td':'tt';
        const tl=p.type==='mobile'?t('tyM'):p.type==='desktop'?t('tyD'):t('tyT');
        const cp=p.componentized||0, st=p.styles||0;
        return `<tr><td style="font-weight:500">${p.name}</td><td><span class="tag ${tc}">${tl}</span></td>
          <td><div class="bcl"><div class="bct"><div class="bcf" style="width:${cp}%;background:${sc(cp)}"></div></div><span class="bcp" style="color:${sc(cp)}">${cp}%</span></div></td>
          <td><div class="bcl"><div class="bct"><div class="bcf" style="width:${st}%;background:var(--blue)"></div></div><span class="bcp" style="color:var(--blue)">${st}%</span></div></td>
          <td style="text-align:right;font-family:var(--mono);color:var(--red)">${fmt(p.loose)}</td>
          <td style="text-align:right;font-family:var(--mono);color:var(--amber)">${fmt(p.hardcoded)}</td></tr>`;
      }).join('')}</tbody></table></div>`:''}
    <div style="display:grid;grid-template-columns:minmax(0,1.5fr) minmax(0,1fr);gap:12px;margin-bottom:12px">
      <div class="card"><div class="ct">${t('secFnd')}</div>
        ${findings.map(fi=>`<div class="fnd"><div class="fbg ${fi.type==='bad'?'fb':fi.type==='warn'?'fw':'fg'}">${fi.type==='bad'?'!':fi.type==='warn'?'~':'✓'}</div><div><div class="ft">${fi.title}</div><div class="fd">${fi.desc}</div></div></div>`).join('')}
        ${notes?`<div class="notes">${notes}</div>`:''}
      </div>
      <div class="card"><div class="ct">${top.length?t('secTop'):'Comps'}</div>
        ${top.length?top.map(c=>`<div class="spr"><span class="spn">${c.name}</span><div class="spk"><div class="spf" style="width:${Math.round(c.vars/maxV*100)}%"></div></div><span class="spv">${c.vars}</span></div>`).join(''):`<p style="font-size:12px;color:var(--ink3)">${t('secNoC')}</p>`}
      </div>
    </div>
    <div class="card"><div class="ct">${t('secRef')}</div>
      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px">
        ${prios.map((p,i)=>`<div class="prio"><span class="pn">${i+1}</span><span class="pt">${p.text}</span><span class="ptag ${p.level}">${p.level==='crit'?t('pCrit'):p.level==='high'?t('pHigh'):t('pMed')}</span></div>`).join('')}
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    charts['f-donut']=new Chart(document.getElementById('f-donut'),{type:'doughnut',data:{datasets:[{data:[avgComp,100-avgComp],backgroundColor:['#2ecc8a','#e74c3c'],borderWidth:0,hoverOffset:3}]},options:{responsive:true,maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataIndex===0?` ${c.raw}% componentizado`:` ${c.raw}% solto`}}}}});
  }, 60);
}

function buildPrios(f) {
  const p = [];
  if((f.scores?.tokens||0)<20) p.push({text:t('piTok'),level:'crit'});
  if((f.loose||0)>300) p.push({text:t('piLooPre')+' '+fmt(f.loose)+' '+t('piLoo'),level:'crit'});
  const worst=(f.pages||[]).sort((a,b)=>(a.componentized||0)-(b.componentized||0))[0];
  if(worst&&(worst.componentized||0)<40) p.push({text:t('piRefPre')+' "'+worst.name+'" — '+worst.componentized+'% '+t('piRef'),level:'crit'});
  if((f.scores?.a11y||0)<50) p.push({text:t('piA11'),level:'high'});
  if((f.scores?.coverage||0)<30) p.push({text:t('piCov'),level:'high'});
  if((f.scores?.naming||0)<75) p.push({text:t('piNam'),level:'high'});
  if((f.scores?.meta||0)<60) p.push({text:t('piMet'),level:'high'});
  if((f.hardcoded||0)>200) p.push({text:t('piHrdPre')+' '+fmt(f.hardcoded)+' '+t('piHrd'),level:'med'});
  if(!p.length) p.push({text:t('piDef'),level:'med'});
  return p.slice(0,8);
}
