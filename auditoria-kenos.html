<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Figma Audit — Gauge × KÉNOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --cream:#faf9f6; --white:#ffffff; --ink:#1a1814; --ink2:#3d3b36;
  --ink3:#7a7872; --ink4:#bbb8b0; --line:#e8e5de; --line2:#f0ede6;
  --green:#1a7a52; --gl:#e8f4ee; --gm:#2ecc8a;
  --amber:#a05000; --al:#fef3e4; --am:#f5a623;
  --red:#b02a20; --rl:#fdecea; --rm:#e74c3c;
  --blue:#1a4fa0; --bl:#eaf0fb; --bm:#4d9fff;
  --purple:#5b3fa0; --pm:#8b6fd4; --pl:#ede9ff;
  --sans:'Geist',sans-serif; --mono:'Geist Mono',monospace;
  --r:8px; --rs:4px;
  --sh:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --sh-sm:0 1px 2px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased}
body{min-height:100vh}

/* ── LAYOUT ── */
.shell{display:flex;min-height:100vh}
.sidebar{width:224px;min-height:100vh;background:var(--white);border-right:1px solid var(--line);flex-shrink:0;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;min-width:0;overflow-x:hidden}

/* ── SIDEBAR ── */
.sb-brand{padding:22px 18px 18px;border-bottom:1px solid var(--line)}
.sb-mark{width:30px;height:30px;background:var(--ink);border-radius:7px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.sb-name{font-size:13px;font-weight:600;color:var(--ink);letter-spacing:-.01em}
.sb-sub{font-size:11px;color:var(--ink3);margin-top:1px;font-family:var(--mono)}
.sb-section{padding:14px 10px 6px}
.sb-lbl{font-size:10px;font-weight:500;color:var(--ink4);text-transform:uppercase;letter-spacing:.09em;padding:0 8px 7px;font-family:var(--mono)}
.nb{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--r);cursor:pointer;font-size:12px;font-weight:400;color:var(--ink2);border:none;background:none;width:100%;text-align:left;transition:all .12s;font-family:var(--sans)}
.nb:hover{background:var(--line2);color:var(--ink)}
.nb.active{background:var(--ink);color:var(--white)}
.nb.active .ns{color:rgba(255,255,255,.5)}
.nd{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.nl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ns{font-family:var(--mono);font-size:11px;font-weight:500;margin-left:auto;flex-shrink:0}
.sb-foot{margin-top:auto;padding:12px 10px;border-top:1px solid var(--line)}
.sb-foot p{font-size:11px;color:var(--ink4);line-height:1.5;padding:8px 9px;background:var(--cream);border-radius:var(--r)}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;background:var(--white);border-bottom:1px solid var(--line);gap:12px;flex-wrap:wrap}
.tb-eye{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-bottom:4px}
.tb-title{font-size:20px;font-weight:600;color:var(--ink);letter-spacing:-.02em;line-height:1.2}
.tb-sub{font-size:11px;color:var(--ink3);margin-top:3px;font-family:var(--mono)}
.badge{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;font-family:var(--mono)}
.badge.good{background:var(--gl);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.badge.warn{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.badge.bad{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.bdot{width:6px;height:6px;border-radius:50%;background:currentColor}

/* ── CONTENT ── */
.content{padding:28px 32px}

/* ── KPI ── */
.krow{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}
.kpi{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh-sm)}
.kl{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;font-family:var(--mono);margin-bottom:8px}
.kv{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em;color:var(--ink)}
.kv.good{color:var(--green)}.kv.warn{color:var(--amber)}.kv.bad{color:var(--red)}
.ks{font-size:11px;color:var(--ink3);margin-top:6px;font-family:var(--mono)}

/* ── GRIDS ── */
.g2{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(0,1fr);gap:12px;margin-bottom:12px}
.g2e{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;margin-bottom:12px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:12px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:12px}

/* ── CARD ── */
.card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh-sm)}
.ct{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;font-family:var(--mono);margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line2)}

/* ── SCORE BARS ── */
.sr{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.sn{font-size:12px;color:var(--ink2);width:150px;flex-shrink:0}
.st{flex:1;height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
.sf{height:100%;border-radius:2px;transition:width .5s ease}
.sv{font-family:var(--mono);font-size:12px;font-weight:500;width:28px;text-align:right}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);padding:0 8px 10px;border-bottom:1px solid var(--line)}
.tbl td{padding:10px 8px;border-bottom:1px solid var(--line2);font-size:12px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--cream)}
.tag{display:inline-flex;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:500;font-family:var(--mono)}
.tm{background:#ede9ff;color:#5b3fa0}.td{background:var(--gl);color:var(--green)}.tt{background:var(--al);color:var(--amber)}
.barcell{display:flex;align-items:center;gap:8px}
.bct{flex:1;height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
.bcf{height:100%;border-radius:2px}
.bcp{font-family:var(--mono);font-size:11px;width:32px}

/* ── DONUT ── */
.dwrap{position:relative;height:158px}
.dcenter{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.dbig{font-size:26px;font-weight:700;letter-spacing:-.02em}
.dlbl{font-size:10px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:11px;color:var(--ink2)}
.li{display:flex;align-items:center;gap:5px}
.lsq{width:8px;height:8px;border-radius:2px;display:inline-block}

/* ── FINDINGS ── */
.finding{display:flex;gap:10px;padding:10px 0;border-bottom:1px solid var(--line2);align-items:flex-start}
.finding:last-child{border-bottom:none}
.fbadge{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;margin-top:1px;font-family:var(--mono)}
.fb{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.fw{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.fg{background:var(--gl);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.ft{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:2px}
.fd{font-size:11px;color:var(--ink3);line-height:1.5}

/* ── PRIORITIES ── */
.prio{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:var(--r);background:var(--cream);margin-bottom:5px;border:1px solid var(--line2)}
.pn{font-family:var(--mono);font-size:10px;color:var(--ink4);width:14px;flex-shrink:0;padding-top:1px}
.pt{font-size:11px;flex:1;line-height:1.5;color:var(--ink2)}
.ptag{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap;font-family:var(--mono);flex-shrink:0}
.ptag.crit{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.ptag.high{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.ptag.med{background:var(--bl);color:var(--blue);border:1px solid rgba(77,159,255,.2)}

/* ── SPARKS ── */
.sprow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.spname{font-size:11px;color:var(--ink2);width:115px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sptrack{flex:1;height:4px;background:var(--line2);border-radius:2px;overflow:hidden}
.spfill{height:100%;border-radius:2px;background:var(--pm)}
.spval{font-family:var(--mono);font-size:11px;color:var(--purple);width:26px;text-align:right}

/* ── OFC (Overview file card) ── */
.ofc{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--white);border:1px solid var(--line);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .14s;box-shadow:var(--sh-sm)}
.ofc:hover{border-color:var(--ink4);box-shadow:var(--sh);transform:translateY(-1px)}
.ofc-info{flex:1;min-width:0}
.ofc-name{font-size:13px;font-weight:500;color:var(--ink);margin-bottom:2px}
.ofc-meta{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.ofc-kpis{display:flex;gap:20px;flex-shrink:0}
.ofc-k{text-align:center}
.ofc-kv{font-size:18px;font-weight:700;letter-spacing:-.02em;line-height:1}
.ofc-kl{font-size:9px;color:var(--ink3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;margin-top:2px}
.ofc-arr{color:var(--ink4);flex-shrink:0}
.notes{background:var(--cream);border-left:2px solid var(--line);padding:10px 12px;font-size:11px;color:var(--ink2);line-height:1.6;margin-top:12px;border-radius:0 var(--rs) var(--rs) 0}

/* ── SECTION LABEL ── */
.sec{font-size:10px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin:24px 0 12px}
.divider{height:1px;background:var(--line);margin:24px 0}

/* ── EXECUTIVE ELEMENTS ── */

/* DS Maturity Score — big hero number */
.maturity-hero{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:28px 32px;box-shadow:var(--sh-sm);display:flex;align-items:center;gap:32px;margin-bottom:12px}
.maturity-score{flex-shrink:0;text-align:center}
.maturity-num{font-size:72px;font-weight:700;letter-spacing:-.04em;line-height:1}
.maturity-lbl{font-size:11px;font-weight:500;color:var(--ink3);text-transform:uppercase;letter-spacing:.1em;font-family:var(--mono);margin-top:4px}
.maturity-divider{width:1px;height:80px;background:var(--line);flex-shrink:0}
.maturity-body{flex:1;min-width:0}
.maturity-headline{font-size:16px;font-weight:600;color:var(--ink);letter-spacing:-.01em;margin-bottom:8px;line-height:1.35}
.maturity-desc{font-size:13px;color:var(--ink2);line-height:1.65}
.maturity-phases{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.phase-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid var(--line)}
.ph1{background:var(--rl);color:var(--red);border-color:rgba(231,76,60,.2)}
.ph2{background:var(--al);color:var(--amber);border-color:rgba(245,166,35,.2)}
.ph3{background:var(--gl);color:var(--green);border-color:rgba(46,204,138,.2)}
.phase-num{font-family:var(--mono);font-weight:700}

/* Risk flags */
.risk-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-bottom:12px}
.risk-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh-sm);cursor:pointer;transition:all .13s}
.risk-card:hover{transform:translateY(-1px);box-shadow:var(--sh)}
.risk-flag{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;font-family:var(--mono);margin-bottom:10px}
.rf-block{background:var(--rl);color:var(--red);border:1px solid rgba(231,76,60,.2)}
.rf-risk{background:var(--al);color:var(--amber);border:1px solid rgba(245,166,35,.2)}
.rf-ok{background:var(--gl);color:var(--green);border:1px solid rgba(46,204,138,.2)}
.rf-wip{background:var(--pl);color:var(--purple);border:1px solid rgba(139,111,212,.2)}
.risk-name{font-size:12px;font-weight:500;color:var(--ink);margin-bottom:4px}
.risk-reason{font-size:11px;color:var(--ink3);line-height:1.45}
.risk-score{font-family:var(--mono);font-size:20px;font-weight:700;letter-spacing:-.02em;margin-top:8px}

/* Dependency map */
.dep-map{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;box-shadow:var(--sh-sm);margin-bottom:12px}
.dep-row{display:flex;align-items:center;gap:0;margin-bottom:10px}
.dep-row:last-child{margin-bottom:0}
.dep-node{padding:8px 14px;border-radius:var(--r);font-size:12px;font-weight:500;white-space:nowrap;border:1px solid var(--line);background:var(--white)}
.dep-arrow{flex:1;display:flex;align-items:center;padding:0 8px;color:var(--ink4);font-size:11px;font-family:var(--mono);gap:4px}
.dep-arrow-line{flex:1;height:1px;background:var(--line)}
.dep-label{font-size:10px;white-space:nowrap;color:var(--ink3)}
.dep-nodes-col{display:flex;flex-direction:column;gap:6px}
.dep-brace{font-size:24px;color:var(--line);padding:0 8px;line-height:1}

/* Radar chart */
.radar-wrap{position:relative;height:240px}

/* Roadmap */
.roadmap{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
.rm-card{border-radius:var(--r);padding:16px 18px;border:1px solid}
.rm1{background:#fff5f5;border-color:rgba(231,76,60,.15)}
.rm2{background:#fffbf0;border-color:rgba(245,166,35,.15)}
.rm3{background:#f0faf5;border-color:rgba(46,204,138,.15)}
.rm-phase{font-size:10px;font-weight:600;font-family:var(--mono);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px}
.rm1 .rm-phase{color:var(--red)}.rm2 .rm-phase{color:var(--amber)}.rm3 .rm-phase{color:var(--green)}
.rm-title{font-size:13px;font-weight:600;color:var(--ink);margin-bottom:4px}
.rm-duration{font-size:11px;font-family:var(--mono);margin-bottom:10px}
.rm1 .rm-duration{color:var(--red)}.rm2 .rm-duration{color:var(--amber)}.rm3 .rm-duration{color:var(--green)}
.rm-item{display:flex;gap:7px;font-size:11px;color:var(--ink2);margin-bottom:5px;line-height:1.45}
.rm-bullet{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:4px}
.rm1 .rm-bullet{background:var(--red)}.rm2 .rm-bullet{background:var(--amber)}.rm3 .rm-bullet{background:var(--green)}
.rm-impact{margin-top:10px;padding:8px 10px;border-radius:var(--rs);font-size:11px;font-family:var(--mono);font-weight:500}
.rm1 .rm-impact{background:rgba(231,76,60,.08);color:var(--red)}
.rm2 .rm-impact{background:rgba(245,166,35,.08);color:var(--amber)}
.rm3 .rm-impact{background:rgba(46,204,138,.08);color:var(--green)}

/* Method tag */
.mtag{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:20px;font-size:10px;font-family:var(--mono);background:var(--cream);border:1px solid var(--line);color:var(--ink3);margin-bottom:16px}

/* Debt card */
.debt-card{background:var(--white);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh-sm)}
.debt-num{font-size:32px;font-weight:700;letter-spacing:-.03em;color:var(--ink);margin-bottom:2px}
.debt-label{font-size:11px;color:var(--ink3);font-family:var(--mono)}
.debt-est{margin-top:10px;padding:8px 10px;background:var(--al);border-radius:var(--rs);font-size:11px;color:var(--amber);font-family:var(--mono);font-weight:500}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--line2);padding:3px;border-radius:var(--r);margin-bottom:16px;width:fit-content}
.tab{padding:6px 14px;border-radius:6px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:none;color:var(--ink3);transition:all .13s;font-family:var(--sans)}
.tab.active{background:var(--white);color:var(--ink);box-shadow:var(--sh-sm)}
.tab-content{display:none}.tab-content.active{display:block}

/* Tooltip-style insight box */
.insight{background:var(--bl);border:1px solid rgba(77,159,255,.2);border-radius:var(--r);padding:12px 14px;font-size:12px;color:var(--blue);line-height:1.55;margin-bottom:12px}
.insight strong{font-weight:600}

/* ── CHART WRAP ── */
.cw{position:relative;height:200px}
.cwt{position:relative;height:230px}
.cws{position:relative;height:260px}

/* scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
canvas{display:block}
</style>
</head>

let charts={}, view='exec';
const sc = v => v>=70?'#1a7a52':v>=40?'#a05000':'#b02a20';
const hc = v => v>=70?'good':v>=45?'warn':'bad';
const hl = v => v>=70?'Good':v>=45?'Poor':'Critical';
const fmt = n => (n||0).toLocaleString('pt-BR');
const avg = arr => Math.round(arr.reduce((a,v)=>a+v,0)/arr.length);

function killCharts(){ Object.values(charts).forEach(c=>{try{c.destroy()}catch{}}); charts={}; }
function go(id){ view=id; killCharts(); renderNav(); render(id); }

function renderNav(){
  ['exec','tech'].forEach(id=>{
    const el=document.getElementById('nav-'+id);
    if(el) el.className='nb'+(view===id?' active':'');
  });
  document.getElementById('file-nav').innerHTML=FILES.map(f=>`
    <button class="nb ${view===f.id?'active':''}" onclick="go('${f.id}')">
      <span class="nd" style="background:${sc(f.health)}"></span>
      <span class="nl">${f.name}</span>
      <span class="ns">${f.health}</span>
    </button>`).join('');
}

function render(id){
  const m=document.getElementById('main');
  if(id==='exec') renderExec(m);
  else if(id==='tech') renderTech(m);
  else renderFile(m, FILES.find(f=>f.id===id));
}

// FILE VIEW (individual)
// ═══════════════════════════════════════════
function renderFile(main,f){
  if(!f){main.innerHTML='';return;}
  const pages=f.pages||[];
  const avgComp=pages.length?avg(pages.map(p=>p.componentized||0)):0;
  const avgStyle=pages.length?avg(pages.map(p=>p.styles||0)):0;
  const bestPg=pages.length?[...pages].sort((a,b)=>(b.styles||0)-(a.styles||0))[0]:null;
  const worstPg=pages.length?[...pages].sort((a,b)=>(a.componentized||0)-(b.componentized||0))[0]:null;
  const top=f.topComponents||[];
  const maxV=top.length?Math.max(...top.map(c=>c.vars)):1;
  const prios=buildPrios(f);
  const riskClass={block:'rf-block',risk:'rf-risk',ok:'rf-ok',wip:'rf-wip'};
  const riskLabels={block:'Bloqueador',risk:'Atenção',ok:'Estável',wip:'Em dev.'};

  main.innerHTML=`
  <div class="topbar">
    <div>
      <div class="tb-eye">Relatório de arquivo</div>
      <div class="tb-title">${f.name}</div>
      <div class="tb-sub">${f.key} · ${f.auditedAt}</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
      <span class="risk-flag ${riskClass[f.risk]}" style="margin:0">${riskLabels[f.risk]}</span>
      <div class="badge ${hc(f.health)}"><span class="bdot"></span>${f.health}/100 — ${hl(f.health)}</div>
    </div>
  </div>
  <div class="content">
    <div class="mtag"><svg width="10" height="10" viewBox="0 0 10 10" fill="none"><circle cx="5" cy="5" r="4" stroke="currentColor" stroke-width="1.2"/><path d="M5 3v2L6.5 6.5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>health score · componentização por página · estilos vs. hardcoded · top components · findings automáticos</div>

    <div class="krow">
      <div class="kpi"><div class="kl">Componentes únicos</div><div class="kv">${fmt(f.comps)}</div><div class="ks">sets + masters</div></div>
      <div class="kpi"><div class="kl">Variações totais</div><div class="kv">${fmt(f.vars)}${f.vars>0?'+':''}</div><div class="ks">variantes em uso</div></div>
      <div class="kpi"><div class="kl">Nós soltos</div><div class="kv bad">${fmt(f.loose)}</div><div class="ks">sem componentizar</div></div>
      <div class="kpi"><div class="kl">Hardcoded</div><div class="kv bad">${fmt(f.hardcoded)}</div><div class="ks">sem estilo vinculado</div></div>
    </div>
    <div class="krow">
      <div class="kpi"><div class="kl">Comp. médio</div><div class="kv ${hc(avgComp)}">${avgComp}%</div><div class="ks">por página</div></div>
      <div class="kpi"><div class="kl">Estilos médio</div><div class="kv ${hc(avgStyle)}">${avgStyle}%</div><div class="ks">por página</div></div>
      ${bestPg?`<div class="kpi"><div class="kl">Melhor página</div><div class="kv good">${bestPg.styles}%</div><div class="ks">${bestPg.name}</div></div>`:'<div class="kpi"></div>'}
      ${worstPg?`<div class="kpi"><div class="kl">Pior página</div><div class="kv bad">${worstPg.componentized}%</div><div class="ks">${worstPg.name}</div></div>`:'<div class="kpi"></div>'}
    </div>

    <div class="g2">
      <div class="card">
        <div class="ct">Score de saúde — 6 dimensões</div>
        ${[['Consistência interna',f.scores?.consist||0],['Naming e semântica',f.scores?.naming||0],['Metadata',f.scores?.meta||0],['Acessibilidade',f.scores?.a11y||0],['Token architecture',f.scores?.tokens||0],['Coverage',f.scores?.coverage||0]]
          .map(([l,v])=>`<div class="sr"><span class="sn">${l}</span><div class="st"><div class="sf" style="width:${v}%;background:${sc(v)}"></div></div><span class="sv" style="color:${sc(v)}">${v}</span></div>`).join('')}
      </div>
      <div class="card">
        <div class="ct">Componentização geral</div>
        <div class="dwrap"><canvas id="f-donut"></canvas>
          <div class="dcenter"><div class="dbig" style="color:${sc(avgComp)}">${avgComp}%</div><div class="dlbl">componentizados</div></div>
        </div>
        <div class="legend">
          <span class="li"><span class="lsq" style="background:var(--gm)"></span>Componentizados</span>
          <span class="li"><span class="lsq" style="background:var(--rm)"></span>Soltos</span>
        </div>
      </div>
    </div>

    ${pages.length?`
    <div class="card">
      <div class="ct">Por página — componentização e estilos</div>
      <table class="tbl">
        <thead><tr><th>Página</th><th>Tipo</th><th style="width:150px">Componentizados</th><th style="width:150px">Com estilo/variável</th><th style="text-align:right">Soltos</th><th style="text-align:right">Hardcoded</th></tr></thead>
        <tbody>${pages.map(p=>{
          const tc=p.type==='mobile'?'tm':p.type==='desktop'?'td':'tt';
          const tl=p.type==='mobile'?'Mobile':p.type==='desktop'?'Desktop':'Template';
          const cp=p.componentized||0,st=p.styles||0;
          return`<tr><td style="font-weight:500">${p.name}</td><td><span class="tag ${tc}">${tl}</span></td>
          <td><div class="barcell"><div class="bct"><div class="bcf" style="width:${cp}%;background:${sc(cp)}"></div></div><span class="bcp" style="color:${sc(cp)}">${cp}%</span></div></td>
          <td><div class="barcell"><div class="bct"><div class="bcf" style="width:${st}%;background:var(--blue)"></div></div><span class="bcp" style="color:var(--blue)">${st}%</span></div></td>

      <div class="card">
        <div class="ct">Principais achados</div>
        ${(f.findings||[]).map(fi=>`
        <div class="finding">
          <div class="fbadge ${fi.type==='bad'?'fb':fi.type==='warn'?'fw':'fg'}">${fi.type==='bad'?'!':fi.type==='warn'?'~':'✓'}</div>
          <div><div class="ft">${fi.title}</div><div class="fd">${fi.desc}</div></div>
        </div>`).join('')}
        ${f.notes?`<div class="notes">${f.notes}</div>`:''}
      </div>
      <div class="card">
        <div class="ct">${top.length?'Top componentes por variações':'Componentes'}</div>
        ${top.length?top.map(c=>`<div class="sprow"><span class="spname">${c.name}</span><div class="sptrack"><div class="spfill" style="width:${Math.round(c.vars/maxV*100)}%"></div></div><span class="spval">${c.vars}</span></div>`).join('')
        :'<p style="font-size:12px;color:var(--ink3)">Sem component sets com variantes.</p>'}
      </div>
    </div>

    <div class="card">
      <div class="ct">Plano de refactor — prioridades</div>
      <div style="display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px">
        ${prios.map((p,i)=>`<div class="prio"><span class="pn">${i+1}</span><span class="pt">${p.text}</span><span class="ptag ${p.level}">${p.level==='crit'?'Crítico':p.level==='high'?'Alto':'Médio'}</span></div>`).join('')}
      </div>
    </div>
  </div>`;

  setTimeout(()=>{
    charts['f-donut']=new Chart(document.getElementById('f-donut'),{
      type:'doughnut',
      data:{datasets:[{data:[avgComp,100-avgComp],backgroundColor:['#2ecc8a','#e74c3c'],borderWidth:0,hoverOffset:3}]},
      options:{responsive:true,maintainAspectRatio:false,cutout:'74%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataIndex===0?` ${c.raw}% componentizado`:` ${c.raw}% solto`}}}}
    });
  },60);
}

function buildPrios(f){
  const p=[];
  if((f.scores?.tokens||0)<20)p.push({text:'Criar variáveis Figma locais — cores, tipografia e espaçamento vinculados ao DS',level:'crit'});
  if((f.loose||0)>300)p.push({text:`Componentizar ${fmt(f.loose)} nós soltos — priorizar páginas de template`,level:'crit'});
  const worst=(f.pages||[]).sort((a,b)=>(a.componentized||0)-(b.componentized||0))[0];
  if(worst&&(worst.componentized||0)<40)p.push({text:`Refatorar "${worst.name}" — ${worst.componentized}% componentizado (meta >70%)`,level:'crit'});
  if((f.scores?.a11y||0)<50)p.push({text:'Auditoria de acessibilidade — contrastes, labels e navegação por teclado',level:'high'});
  if((f.scores?.coverage||0)<30)p.push({text:'Adicionar descrições e metadata nos componentes sem anotação',level:'high'});
  if((f.scores?.naming||0)<75)p.push({text:'Padronizar nomenclatura — renomear variantes e frames genéricos',level:'high'});
  if((f.scores?.meta||0)<60)p.push({text:'Revisar metadata — props, variantes e links de documentação',level:'high'});
  if((f.hardcoded||0)>200)p.push({text:`Substituir ${fmt(f.hardcoded)} valores hardcoded por estilos ou variáveis`,level:'med'});
  if(!p.length)p.push({text:'Manter padrão e documentar boas práticas para referência do time',level:'med'});
  return p.slice(0,8);
}
